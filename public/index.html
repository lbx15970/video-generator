<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Seedance 2.0 - 视频生成工具</title>
  <meta name="description" content="Seedance 2.0 AI 视频生成工具，支持文生视频、图生视频、首尾帧等多种模式">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <span>Seedance 2.0</span>
        </div>
      </div>
      <div class="header-right">
        <div class="task-counter" id="taskCounter">
          <span class="counter-badge">0</span>
          <span>任务</span>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 左侧面板 - 参数设置 -->
      <aside class="sidebar">
        <!-- 模式选择 -->
        <section class="panel">
          <h2 class="panel-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            生成模式
          </h2>
          <div class="mode-selector">
            <button class="mode-btn active" data-mode="text2video">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span>文生视频</span>
            </button>
            <button class="mode-btn" data-mode="image2video">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span>参考生成</span>
            </button>
            <button class="mode-btn" data-mode="firstlast">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="8" height="14" rx="1"/><rect x="14" y="3" width="8" height="14" rx="1"/><path d="M10 10h4"/><path d="M12 8v4"/></svg>
              <span>首尾帧</span>
            </button>
          </div>
        </section>

        <!-- 提示词输入 -->
        <section class="panel">
          <h2 class="panel-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            提示词
          </h2>
          <div class="prompt-wrapper">
            <textarea id="promptInput" class="prompt-input" rows="5" placeholder="描述你想要的视频内容...&#10;&#10;💡 建议格式：[画面描述] + [声音/对白描述]&#10;💡 输入 @ 可引用已上传的素材&#10;例：@素材1 中的女孩转身微笑，温暖的阳光"></textarea>
            <div class="mention-popup" id="mentionPopup" style="display:none"></div>
          </div>
          <div class="web-search-toggle" id="webSearchToggleArea">
            <label class="web-search-label" for="webSearchToggle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              联网搜索
              <span class="param-hint" title="开启后，生成视频前会先联网搜索提示词相关信息，用搜索结果优化视频描述。基于火山引擎联网内容插件。">ⓘ</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="webSearchToggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="uploaded-assets" id="uploadedAssets" style="display:none">
            <div class="assets-label">已上传素材（点击插入 @引用）：</div>
            <div class="assets-tags" id="assetsTags"></div>
          </div>
        </section>

        <!-- 参考图片上传区 (仅在图生视频/首尾帧模式显示) -->
        <section class="panel" id="uploadPanel" style="display: none;">
          <h2 class="panel-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="uploadTitle">参考图片</span>
          </h2>
          <div class="upload-zone" id="firstFrameZone">
            <div class="upload-placeholder" id="firstFramePlaceholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span>点击或拖拽上传首帧图片</span>
              <small>支持 JPG / PNG / WebP</small>
            </div>
            <img id="firstFramePreview" class="upload-preview" style="display:none">
            <button class="upload-remove" id="firstFrameRemove" style="display:none">✕</button>
            <input type="file" id="firstFrameInput" accept="image/*" hidden>
          </div>
          <div class="upload-zone" id="lastFrameZone" style="display: none;">
            <div class="upload-placeholder" id="lastFramePlaceholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span>点击或拖拽上传尾帧图片</span>
              <small>支持 JPG / PNG / WebP</small>
            </div>
            <img id="lastFramePreview" class="upload-preview" style="display:none">
            <button class="upload-remove" id="lastFrameRemove" style="display:none">✕</button>
            <input type="file" id="lastFrameInput" accept="image/*" hidden>
          </div>
        </section>

        <!-- 常用参数 -->
        <section class="panel">
          <h2 class="panel-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            参数设置
          </h2>
          <div class="param-grid">
            <div class="param-item">
              <label>视频比例</label>
              <select id="ratioSelect">
                <option value="16:9">16:9（横屏）</option>
                <option value="9:16">9:16（竖屏）</option>
                <option value="1:1">1:1（方形）</option>
                <option value="4:3">4:3</option>
                <option value="3:4">3:4</option>
                <option value="21:9">21:9（超宽）</option>
                <option value="adaptive">自适应</option>
              </select>
            </div>
            <div class="param-item">
              <label>分辨率</label>
              <select id="resolutionSelect">
                <option value="720p">720p</option>
                <option value="480p">480p</option>
              </select>
            </div>
            <div class="param-item full-width">
              <label>
                视频时长
                <span class="param-value" id="durationValue">5 秒</span>
              </label>
              <input type="range" id="durationSlider" min="4" max="15" value="5" step="1" class="slider">
              <div class="slider-labels">
                <span>4秒</span>
                <span>15秒</span>
              </div>
            </div>
            <div class="param-item">
              <label>生成数量</label>
              <div class="number-input">
                <button class="num-btn" id="countMinus">−</button>
                <input type="number" id="countInput" value="1" min="1" max="8">
                <button class="num-btn" id="countPlus">+</button>
              </div>
            </div>
            <div class="param-item">
              <label>音频输出</label>
              <label class="toggle">
                <input type="checkbox" id="audioToggle" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </section>

        <!-- 高级参数（折叠） -->
        <section class="panel collapsible">
          <h2 class="panel-title clickable" id="advancedToggle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
            高级参数
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </h2>
          <div class="advanced-params" id="advancedParams" style="display: none;">
            <div class="param-grid">
              <div class="param-item full-width">
                <label>
                  种子值
                  <span class="param-hint" title="固定种子值可以复现相同的生成结果。留空则每次随机。">ⓘ</span>
                </label>
                <input type="number" id="seedInput" placeholder="-1 为随机" value="-1" class="text-input">
              </div>
              <div class="param-item">
                <label>
                  生成超时
                  <span class="param-hint" title="任务的最大等待时间（秒），超时后任务将被取消。默认 172800 秒（48小时）。">ⓘ</span>
                </label>
                <input type="number" id="timeoutInput" placeholder="172800" value="172800" class="text-input">
              </div>
              <div class="param-item">
                <label>水印</label>
                <label class="toggle">
                  <input type="checkbox" id="watermarkToggle" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="param-item">
                <label>
                  返回尾帧
                  <span class="param-hint" title="开启后将返回视频的最后一帧图片，可用于视频续写场景。">ⓘ</span>
                </label>
                <label class="toggle">
                  <input type="checkbox" id="lastFrameToggle">
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </div>
        </section>

        <!-- 费用预估 -->
        <section class="panel cost-panel">
          <h2 class="panel-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            费用预估 <span style="font-size:0.75rem; color:var(--text-muted); font-weight:normal;">（测试阶段暂时免费）</span>
          </h2>
          <div class="cost-info">
            <div class="cost-row">
              <span>单条预估</span>
              <span class="cost-value" id="singleCost">-</span>
            </div>
            <div class="cost-row total">
              <span>总费用预估</span>
              <span class="cost-value" id="totalCost">-</span>
            </div>
            <div class="cost-formula">
              <small>💡 计费规则：0.046 元/千tokens 
                <span class="cost-detail-wrapper">
                  <a class="cost-detail-link">详情</a>
                  <div class="cost-tooltip">
                    视频Token计算公式=（宽*高*帧率*时长）/1024*条数
                  </div>
                </span><br>
                以实际生成消耗为准，此处仅为估算
              </small>
            </div>
          </div>
        </section>

        <!-- 生成按钮 -->
        <button class="generate-btn" id="generateBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始生成
        </button>
      </aside>

      <!-- 右侧 - 生成结果区 -->
      <div class="content">
        <div class="content-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          <span>生成结果</span>
        </div>
        <div class="results-area">
          <div class="empty-state" id="emptyState">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <h3>暂无生成结果</h3>
            <p>配置参数后点击「开始生成」</p>
          </div>
          <div class="results-grid" id="resultsGrid"></div>
        </div>
      </div>
    </main>

    <!-- 移动端底部 Tab 导航 -->
    <nav class="mobile-tab-bar" id="mobileTabBar">
      <button class="mobile-tab active" data-tab="settings" id="tabSettings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>生成</span>
      </button>
      <button class="mobile-tab" data-tab="results" id="tabResults">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>结果</span>
        <span class="mobile-tab-badge" id="mobileTaskBadge" style="display:none">0</span>
      </button>
    </nav>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
